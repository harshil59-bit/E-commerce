services:

  db:
    image: postgres:16-alpine
    container_name: cartlabs-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cartlabs
      POSTGRES_USER: cartlabs
      POSTGRES_PASSWORD: cartlabs_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartlabs"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - monitoring-net

  backend:
    image: soham170905/cartlabs-backend:latest
    container_name: cartlabs-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://cartlabs:cartlabs_password@db:5432/cartlabs
    networks:
      - monitoring-net

  frontend:
    image: soham170905/cartlabs-frontend:latest
    container_name: cartlabs-frontend
    networks:
      - monitoring-net

  nginx:
    image: nginx:alpine
    container_name: cartlabs-nginx
    ports:
      - "80:80"   # 🔥 THIS IS REQUIRED
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - monitoring-net

networks:
  monitoring-net:
    external: true
